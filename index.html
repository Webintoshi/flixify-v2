<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Flixify</title>
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { background-color: #0a0a0a; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0a0a0a;
        color: #ffffff;
        min-height: 100vh;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
        flex-direction: column;
        gap: 20px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #e50914;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loader-text {
        color: rgba(255,255,255,0.5);
        font-size: 14px;
      }
      #loader-error {
        color: #e50914;
        font-size: 12px;
        max-width: 80%;
        text-align: center;
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="initial-loader">
      <div class="spinner"></div>
      <div id="loader-text">Yükleniyor...</div>
      <div id="loader-error"></div>
    </div>
    <div id="root"></div>
    
    <script>
      // Debug info
      console.log('[Flixify] Initializing...');
      
      // Check if env vars are available
      const supabaseUrl = '%VITE_SUPABASE_URL%';
      console.log('[Flixify] Supabase URL:', supabaseUrl);
      
      if (supabaseUrl.includes('VITE_SUPABASE_URL')) {
        document.getElementById('loader-text').textContent = 'Yapılandırma hatası';
        document.getElementById('loader-error').style.display = 'block';
        document.getElementById('loader-error').textContent = 
          'Environment variables yüklenemedi. Lütfen Coolify ayarlarını kontrol edin.';
        throw new Error('Environment variables not loaded');
      }
      
      // Auto-remove after 10s failsafe
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          document.getElementById('loader-text').textContent = 'Yükleme zaman aşımı';
          document.getElementById('loader-error').style.display = 'block';
          document.getElementById('loader-error').textContent = 
            'Uygulama yüklenemedi. Lütfen sayfayı yenileyin.';
        }
      }, 10000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
